version: "3"

silent: true

tasks:
  format:
    desc: 'Run all code formatters. Important vars: "paths", "gciPrefix", "prettierPattern", "prettierImage", "prettierVersion".'
    cmds:
      - task: format:gci
      - task: format:gofumpt
      - task: format:prettier

  format:gci:
    desc: 'Format code with gci. Important vars: "paths", "gciPrefix".'
    cmds:
      - gci write -s Standard -s Default -s 'Prefix({{.gciPrefix | default "github.com/werf/"}})' --skip-generated {{.CLI_ARGS}} {{.paths | default "pkg/ cmd/ test/"}}

  format:gofumpt:
    desc: 'Format code with gofumpt. Important vars: "paths".'
    cmds:
      - gofumpt -extra -w {{.CLI_ARGS}} {{.paths | default "cmd/ pkg/ test/"}}

  format:prettier:
    desc: 'Format with prettier. Important vars: "prettierPattern", "prettierImage", "prettierVersion".'
    deps:
      - format:prettier:yaml

  _prettier:run:
    internal: true
    cmds:
      - docker run --rm -u "$(id -u):$(id -g)" -v "$(pwd):/work" {{.prettierImage | default "tmknom/prettier"}}:{{.prettierVersion | default "3.5.3"}} {{.args}}

  format:prettier:yaml:
    desc: 'Format yaml files with prettier. Important vars: "prettierPattern", "prettierImage", "prettierVersion".'
    cmds:
      - task: _prettier:run
        vars:
          args: '-w --no-error-on-unmatched-pattern {{.prettierPattern | default "\"**/*.{yaml,yml}\""}}'

  lint:
    desc: 'Run all linters in parallel. Important vars: "golangciPaths", "golangciConfig", "moduleDir", "prettierPattern", "prettierImage", "prettierVersion".'
    deps:
      - lint:golangci-lint
      - lint:prettier

  _lint:golangci-lint:run:
    internal: true
    cmds:
      - |
        bash <<'BASH'
        project_root="$(pwd)"
        module_dir="{{.moduleDir | default "."}}"
        golangci_lint_bin_dir="{{.golangciLintBinDir | default "./bin"}}"
        golangci_config="{{.golangciConfig | default "https://raw.githubusercontent.com/werf/common-ci/refs/heads/main/.golangci_simple.yml"}}"

        if [ "${module_dir#/}" = "$module_dir" ]; then
          module_dir="$project_root/$module_dir"
        fi

        if [ "${golangci_lint_bin_dir#/}" = "$golangci_lint_bin_dir" ]; then
          golangci_lint_bin_dir="$project_root/$golangci_lint_bin_dir"
        fi

        golangci_lint_bin="$golangci_lint_bin_dir/golangci-lint-{{.golangciLintVersion | default "v1.62.0"}}"

        cd "$module_dir"

        if [ ! -f "$golangci_lint_bin" ]; then
          echo "golangci-lint not installed, run: task deps:install:golangci-lint"
          exit 1
        fi

        run_golangci_lint() {
          "$golangci_lint_bin" run {{if .buildTags}}--build-tags="{{.buildTags}}" {{end}}-c "$1" {{.CLI_ARGS}} {{.golangciPaths | default "./..."}}
        }

        if [ "${golangci_config#https://}" != "$golangci_config" ]; then
          run_golangci_lint <(curl -sSfL "$golangci_config")
        else
          if [ ! -f "$golangci_config" ]; then
            echo "golangci-lint config not found: $golangci_config"
            exit 1
          fi

          run_golangci_lint "$golangci_config"
        fi
        BASH
    env:
      CGO_ENABLED: '{{.cgoEnabled}}'

  lint:golangci-lint:cgo:
    desc: 'Lint with golangci-lint for cgo. Important vars: "golangciPaths", "golangciLintVersion", "golangciConfig", "moduleDir".'
    cmds:
      - task: _lint:golangci-lint:run
        vars:
          buildTags: '{{.cgoTags | default ""}}'
          cgoEnabled: '1'

  lint:golangci-lint:go:
    desc: 'Lint with golangci-lint without cgo. Important vars: "golangciPaths", "golangciLintVersion", "golangciConfig", "moduleDir".'
    cmds:
      - task: _lint:golangci-lint:run
        vars:
          buildTags: '{{.goTags | default ""}}'
          cgoEnabled: '0'

  _lint:golangci-lint:cgo-and-go:
    cmds:
      - task: lint:golangci-lint:cgo
      - task: lint:golangci-lint:go

  _lint:golangci-lint:go:
    deps:
      - task: lint:golangci-lint:go

  lint:golangci-lint:
    desc: 'Lint with golangci-lint (with and without cgo). Important vars: "golangciPaths", "golangciConfig", "moduleDir".'
    cmds:
      - task: '{{ternary "_lint:golangci-lint:cgo-and-go" "lint:golangci-lint:go" (eq .mode "cgo")}}'

  lint:prettier:
    desc: 'Check if prettier-formatted. Important vars: "prettierPattern", "prettierImage", "prettierVersion".'
    deps:
      - lint:prettier:yaml

  lint:prettier:yaml:
    desc: 'Check if yaml files are prettier-formatted. Important vars: "prettierPattern", "prettierImage", "prettierVersion".'
    cmds:
      - task: _prettier:run
        vars:
          args: '--no-error-on-unmatched-pattern -c {{.prettierPattern | default "\"**/*.{yaml,yml}\""}}'
